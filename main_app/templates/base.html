<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>eLearning System</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/animate.css/4.1.1/animate.min.css">
    <style>
        :root { --primary: #4361ee; --secondary: #4cc9f0; --bg-light: #f8f9fa; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-light); }
        .card-modern { border: none; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.04); background: #ffffff; }
        .bubble { max-width: 75%; padding: 12px 16px; border-radius: 20px; font-size: 0.95rem; margin-bottom: 8px; }
        .bubble-me { background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .bubble-them { background: #e9ecef; color: #333; border-bottom-left-radius: 4px; }
        .navbar-blur { backdrop-filter: blur(10px); background: rgba(33, 37, 41, 0.9) !important; }
        .btn-primary { background: var(--primary); border: none; border-radius: 10px; padding: 10px 20px; transition: 0.3s; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(67, 97, 238, 0.3); }
    </style>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eLearning platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div id="root">
        {% block content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
